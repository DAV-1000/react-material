name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: swa-ambitious-tree-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Build and Deploy Job
    env:
      COSMOS_DB_NAME: cosmicworks               # fixed database name
      BASE_CONTAINERS: posts     # comma-separated list of base container names
      PARTITION_KEYS: /id # comma-separated partition keys matching BASE_CONTAINERS
      CONTAINER_THROUGHPUT: 400
      CONTAINER_AUTOSCALE: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            api/package-lock.json

      - name: Set APP_ENV for PRs
        if: github.event_name == 'pull_request'
        run: |
          echo "github.event_name == '${{ github.event_name }}' "
          echo "APP_ENV=staging" >> "$GITHUB_ENV"
          printf "APP_ENV=staging\n" > "$GITHUB_WORKSPACE/api/.env"

      - name: Set APP_ENV for pushes
        if: github.event_name == 'push'
        run: |
          echo "github.event_name == '${{ github.event_name }}' "
          echo "APP_ENV=production" >> "$GITHUB_ENV"
          printf "APP_ENV=production\n" > "$GITHUB_WORKSPACE/api/.env"

      - name: Azure Login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Cosmos DB SQL Database and Containers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          COSMOS_ACCOUNT: ${{ secrets.COSMOS_ACCOUNT }}
        run: |
          set -Eeuo pipefail

          # Create or verify database
          az cosmosdb sql database create \
            --account-name "$COSMOS_ACCOUNT" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$COSMOS_DB_NAME" \
            --only-show-errors

          # Convert comma-separated container names and partition keys to arrays
          IFS=',' read -ra CONTAINERS <<< "$BASE_CONTAINERS"
          IFS=',' read -ra PART_KEYS <<< "$PARTITION_KEYS"

          if [ "${#CONTAINERS[@]}" -ne "${#PART_KEYS[@]}" ]; then
            echo "Number of containers and partition keys must match" >&2
            exit 1
          fi

          # Loop through containers and create each with environment suffix
          for i in "${!CONTAINERS[@]}"; do
            NAME="$(echo "${CONTAINERS[$i]}_${APP_ENV}" | xargs)"
            PART="$(echo "${PART_KEYS[$i]}" | xargs)"

            echo "Checking if container $NAME exists..."
            if az cosmosdb sql container show \
                --account-name "$COSMOS_ACCOUNT" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --database-name "$COSMOS_DB_NAME" \
                --name "$NAME" > /dev/null 2>&1; then
              echo "Container $NAME already exists. Skipping creation."
            else
              echo "Creating container $NAME with partition key $PART..."
              if [[ "$CONTAINER_AUTOSCALE" == "true" ]]; then
                az cosmosdb sql container create \
                  --account-name "$COSMOS_ACCOUNT" \
                  --resource-group "$AZURE_RESOURCE_GROUP" \
                  --database-name "$COSMOS_DB_NAME" \
                  --name "$NAME" \
                  --partition-key-path "$PART" \
                  --max-throughput "$CONTAINER_THROUGHPUT" \
                  --only-show-errors
              else
                az cosmosdb sql container create \
                  --account-name "$COSMOS_ACCOUNT" \
                  --resource-group "$AZURE_RESOURCE_GROUP" \
                  --database-name "$COSMOS_DB_NAME" \
                  --name "$NAME" \
                  --partition-key-path "$PART" \
                  --throughput "$CONTAINER_THROUGHPUT" \
                  --only-show-errors
              fi
            fi
          done

      - name: Install dependencies (frontend)
        working-directory: frontend
        run: npm ci

      - name: Build (frontend)
        working-directory: frontend
        run: npm run build

      - name: Install dependencies (api)
        working-directory: api
        run: npm ci

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_TREE_05189EC03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: "api"
          output_location: "dist"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_TREE_05189EC03 }}
          action: "close"
          app_location: "frontend"
