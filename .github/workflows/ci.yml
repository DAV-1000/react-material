name: ci

on:
  push:
    branches:
      - feat/swa-playwright-cosmos
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      COSMOS_ENDPOINT: https://localhost:8081
      COSMOS_KEY: C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      COSMOS_CERT_PATH: ${{ github.workspace }}/api/certs/cosmos-emulator.pem
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm --prefix api ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Cosmos DB emulator
        run: |
          docker run -d \
            --name cosmosdb \
            -p 8081:8081 \
            -p 10250-10255:10250-10255 \
            mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator

      - name: Wait for Cosmos DB emulator
        run: |
          for i in {1..60}; do
            status="$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8081/ || true)"
            if [ "$status" = "401" ]; then
              exit 0
            fi
            sleep 5
          done
          docker logs cosmosdb
          exit 1

      - name: Download Cosmos emulator certificate
        run: npm run cosmos:cert

      - name: Build API
        run: npm run api:build

      - name: Start SWA CLI
        run: |
          npx swa start http://localhost:5173 --api-location api --run "npm run dev" > swa.log 2>&1 &

      - name: Wait for SWA
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:4280 > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          cat swa.log
          exit 1

      - name: Run Playwright tests
        run: npm run test:e2e
